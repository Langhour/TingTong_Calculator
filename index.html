<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doraemon Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a1a;
    font-family: 'Nunito', sans-serif;
  }

  .calc {
    width: 320px;
    filter: drop-shadow(0 8px 32px rgba(0,0,0,0.5));
  }

  /* ── Display ── */
  .display-wrap {
    background: #29B6F6;
    padding: 10px 10px 0;
  }

  .display {
    background: #1a2a5e;
    border-radius: 10px;
    padding: 10px 14px;
    text-align: right;
    min-height: 64px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .disp-expr {
    color: #7aa0d4;
    font-size: 11px;
    min-height: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .disp-main {
    color: white;
    font-size: 32px;
    font-weight: 900;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Button Grid ── */
  .btn-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    background: #29B6F6;
    padding: 10px 10px 14px;
    border-radius: 0 0 20px 20px;
  }

  .btn {
    border: none;
    border-radius: 12px;
    height: 56px;
    font-size: 18px;
    font-weight: 900;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: transform 0.08s, filter 0.08s;
    user-select: none;
    color: white;
    background: #4DC8F4;
  }

  .btn:active {
    transform: scale(0.92);
    filter: brightness(0.82);
  }

  .btn-eq   { grid-column: span 2; }
  .btn-zero { grid-column: span 2; }

  .dora-btn {
    border: none;
    border-radius: 12px;
    height: 56px;
    cursor: pointer;
    background: #4DC8F4;
    padding: 2px;
    transition: transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .dora-btn:active {
    transform: scale(0.92);
    filter: brightness(0.82);
  }
</style>
</head>
<body>

<div class="calc">

  <!-- ── Doraemon Face ── -->
  <svg id="face-svg" width="320" height="310" viewBox="0 0 320 310" style="display:block;" xmlns="http://www.w3.org/2000/svg">
    <!-- Blue head -->
    <ellipse cx="160" cy="148" rx="148" ry="140" fill="#29B6F6" stroke="#0288D1" stroke-width="3"/>
    <!-- White face -->
    <ellipse cx="160" cy="168" rx="116" ry="110" fill="white" stroke="#1A1A1A" stroke-width="2.5"/>
    <!-- Eye whites -->
    <ellipse cx="120" cy="108" rx="44" ry="46" fill="white" stroke="#1A1A1A" stroke-width="2.5"/>
    <ellipse cx="200" cy="108" rx="44" ry="46" fill="white" stroke="#1A1A1A" stroke-width="2.5"/>
    <!-- Eyes open (default) -->
    <path id="eye-left-open"  d="M103 113 Q120 104 137 113" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
    <path id="eye-right-open" d="M183 113 Q200 104 217 113" fill="none" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Eyes happy/closed (hidden by default) -->
    <path id="eye-left-happy"  d="M103 110 Q120 122 137 110" fill="none" stroke="#1A1A1A" stroke-width="2.8" stroke-linecap="round" style="display:none"/>
    <path id="eye-right-happy" d="M183 110 Q200 122 217 110" fill="none" stroke="#1A1A1A" stroke-width="2.8" stroke-linecap="round" style="display:none"/>
    <!-- Nose -->
    <circle cx="160" cy="150" r="19" fill="#E53935" stroke="#1A1A1A" stroke-width="2"/>
    <circle cx="153" cy="143" r="5"  fill="white" opacity="0.7"/>
    <!-- Whiskers left -->
    <line x1="72"  y1="148" x2="128" y2="156" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
    <line x1="68"  y1="163" x2="128" y2="163" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
    <line x1="72"  y1="178" x2="128" y2="170" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
    <!-- Whiskers right -->
    <line x1="248" y1="148" x2="192" y2="156" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
    <line x1="252" y1="163" x2="192" y2="163" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
    <line x1="248" y1="178" x2="192" y2="170" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
    <!-- Mouth open (default) -->
    <g id="mouth-open">
      <path d="M108 200 Q160 244 212 200" fill="white" stroke="#1A1A1A" stroke-width="2.5"/>
      <line x1="108" y1="200" x2="212" y2="200" stroke="#1A1A1A" stroke-width="2"/>
      <line x1="143" y1="200" x2="143" y2="220" stroke="#ccc" stroke-width="1"/>
      <line x1="177" y1="200" x2="177" y2="220" stroke="#ccc" stroke-width="1"/>
    </g>
    <!-- Mouth closed smile (hidden by default) -->
    <path id="mouth-smile" d="M108 200 Q160 228 212 200" fill="none" stroke="#1A1A1A" stroke-width="2.8" stroke-linecap="round" style="display:none"/>
    <!-- Red collar -->
    <rect x="88" y="270" width="144" height="18" rx="7" fill="#E53935" stroke="#B71C1C" stroke-width="1.5"/>
    <!-- Golden bell -->
    <circle cx="160" cy="292" r="14" fill="#FDD835" stroke="#F57F17" stroke-width="2"/>
    <circle cx="160" cy="292" r="4.5" fill="#F57F17"/>
  </svg>

  <!-- ── Display ── -->
  <div class="display-wrap">
    <div class="display">
      <div class="disp-expr" id="expr"></div>
      <div class="disp-main" id="main">0</div>
    </div>
  </div>

  <!-- ── Button Grid ── -->
  <div class="btn-grid">

    <!-- Row 1 -->
    <button class="btn" onclick="ca('C')">C</button>
    <button class="btn" onclick="ca('+/-')">+/-</button>
    <button class="btn" onclick="ca('%')">%</button>
    <button class="btn" onclick="ca('/')">÷</button>

    <!-- Row 2 -->
    <button class="btn" onclick="ca('7')">7</button>
    <button class="btn" onclick="ca('8')">8</button>
    <button class="btn" onclick="ca('9')">9</button>
    <button class="btn" onclick="ca('*')">×</button>

    <!-- Row 3 -->
    <button class="btn" onclick="ca('4')">4</button>
    <button class="btn" onclick="ca('5')">5</button>
    <button class="btn" onclick="ca('6')">6</button>
    <button class="btn" onclick="ca('-')">−</button>

    <!-- Row 4 -->
    <button class="btn" onclick="ca('1')">1</button>
    <button class="btn" onclick="ca('2')">2</button>
    <button class="btn" onclick="ca('3')">3</button>
    <button class="btn" onclick="ca('+')">+</button>

    <!-- Row 5: 0 (span2)  .  waving-sticker (under +) -->
    <button class="btn btn-zero" onclick="ca('0')">0</button>
    <button class="btn" onclick="ca('.')">.</button>

    <!-- Waving Doraemon — column 4, directly under + -->
    <button class="dora-btn" title="Click me!" onclick="doraClick(this)">
      <svg width="50" height="48" viewBox="0 0 52 48" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="26" cy="30" rx="13" ry="12" fill="#29B6F6" stroke="#0288D1" stroke-width="1.2"/>
        <ellipse cx="26" cy="33" rx="8" ry="7" fill="white" stroke="#ccc" stroke-width="0.8"/>
        <circle cx="26" cy="15" r="12" fill="#29B6F6" stroke="#0288D1" stroke-width="1.2"/>
        <ellipse cx="26" cy="17" rx="9" ry="8.5" fill="white" stroke="#1A1A1A" stroke-width="1"/>
        <path d="M19 13 Q22 18 25 13" fill="none" stroke="#1A1A1A" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M27 13 Q30 18 33 13" fill="none" stroke="#1A1A1A" stroke-width="1.4" stroke-linecap="round"/>
        <circle cx="26" cy="18.5" r="2.4" fill="#E53935" stroke="#1A1A1A" stroke-width="0.8"/>
        <circle cx="25" cy="17.7" r="0.7" fill="white" opacity="0.7"/>
        <line x1="14" y1="18" x2="22" y2="19.5" stroke="#1A1A1A" stroke-width="0.8" stroke-linecap="round"/>
        <line x1="13" y1="21" x2="22" y2="21"    stroke="#1A1A1A" stroke-width="0.8" stroke-linecap="round"/>
        <line x1="38" y1="18" x2="30" y2="19.5" stroke="#1A1A1A" stroke-width="0.8" stroke-linecap="round"/>
        <line x1="39" y1="21" x2="30" y2="21"    stroke="#1A1A1A" stroke-width="0.8" stroke-linecap="round"/>
        <path d="M19 23 Q26 29 33 23" fill="none" stroke="#1A1A1A" stroke-width="1.1" stroke-linecap="round"/>
        <rect x="16" y="24" width="20" height="3" rx="1.5" fill="#E53935" stroke="#B71C1C" stroke-width="0.8"/>
        <circle cx="26" cy="28.5" r="2" fill="#FDD835" stroke="#F57F17" stroke-width="0.8"/>
        <path d="M13 27 Q6 18 9 12" fill="none" stroke="#29B6F6" stroke-width="4" stroke-linecap="round"/>
        <circle cx="9" cy="11" r="4" fill="#29B6F6" stroke="#0288D1" stroke-width="1"/>
        <path d="M39 27 Q44 34 42 38" fill="none" stroke="#29B6F6" stroke-width="4" stroke-linecap="round"/>
        <circle cx="42" cy="39" r="4" fill="#29B6F6" stroke="#0288D1" stroke-width="1"/>
        <ellipse cx="20" cy="43" rx="5" ry="3.5" fill="white" stroke="#1A1A1A" stroke-width="1"/>
        <ellipse cx="32" cy="43" rx="5" ry="3.5" fill="white" stroke="#1A1A1A" stroke-width="1"/>
        <path d="M39 31 Q47 26 45 20" fill="none" stroke="#E53935" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <!-- Row 6: = (span2)  running-sticker -->
    <button class="btn btn-eq" onclick="ca('=')">=</button>

    <!-- Running Doraemon — next to = -->
    <button class="dora-btn" title="Click me!" onclick="doraClick(this)">
      <svg width="50" height="48" viewBox="0 0 52 48" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="26" cy="28" rx="14" ry="13" fill="#29B6F6" stroke="#0288D1" stroke-width="1.2"/>
        <ellipse cx="26" cy="31" rx="9"  ry="8"  fill="white" stroke="#ccc" stroke-width="0.8"/>
        <circle cx="26" cy="14" r="12" fill="#29B6F6" stroke="#0288D1" stroke-width="1.2"/>
        <ellipse cx="26" cy="16" rx="9" ry="8.5" fill="white" stroke="#1A1A1A" stroke-width="1"/>
        <ellipse cx="22" cy="12" rx="3" ry="3.5" fill="white" stroke="#1A1A1A" stroke-width="1"/>
        <ellipse cx="30" cy="12" rx="3" ry="3.5" fill="white" stroke="#1A1A1A" stroke-width="1"/>
        <circle cx="22.8" cy="12.5" r="1.4" fill="#1A1A1A"/>
        <circle cx="30.8" cy="12.5" r="1.4" fill="#1A1A1A"/>
        <circle cx="23.3" cy="11.8" r="0.5" fill="white"/>
        <circle cx="31.3" cy="11.8" r="0.5" fill="white"/>
        <circle cx="26" cy="17" r="2.5" fill="#E53935" stroke="#1A1A1A" stroke-width="0.8"/>
        <circle cx="25" cy="16.2" r="0.7" fill="white" opacity="0.7"/>
        <line x1="14" y1="17"   x2="22" y2="18.5" stroke="#1A1A1A" stroke-width="0.8" stroke-linecap="round"/>
        <line x1="13" y1="19.5" x2="22" y2="19.5" stroke="#1A1A1A" stroke-width="0.8" stroke-linecap="round"/>
        <line x1="38" y1="17"   x2="30" y2="18.5" stroke="#1A1A1A" stroke-width="0.8" stroke-linecap="round"/>
        <line x1="39" y1="19.5" x2="30" y2="19.5" stroke="#1A1A1A" stroke-width="0.8" stroke-linecap="round"/>
        <path d="M20 21 Q26 26 32 21" fill="white" stroke="#1A1A1A" stroke-width="0.9"/>
        <line x1="20" y1="21" x2="32" y2="21" stroke="#1A1A1A" stroke-width="0.8"/>
        <rect x="15" y="22.5" width="22" height="3" rx="1.5" fill="#E53935" stroke="#B71C1C" stroke-width="0.8"/>
        <circle cx="26" cy="27" r="2.2" fill="#FDD835" stroke="#F57F17" stroke-width="0.8"/>
        <ellipse cx="10" cy="26" rx="4" ry="2.5" fill="#29B6F6" stroke="#0288D1" stroke-width="1" transform="rotate(-40,10,26)"/>
        <ellipse cx="42" cy="24" rx="4" ry="2.5" fill="#29B6F6" stroke="#0288D1" stroke-width="1" transform="rotate(30,42,24)"/>
        <ellipse cx="19" cy="41" rx="5" ry="3" fill="white" stroke="#1A1A1A" stroke-width="1" transform="rotate(20,19,41)"/>
        <ellipse cx="33" cy="43" rx="5" ry="3" fill="white" stroke="#1A1A1A" stroke-width="1" transform="rotate(-30,33,43)"/>
        <path d="M38 30 Q46 25 44 19" fill="none" stroke="#E53935" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

  </div>
</div>

<script>
  let cur = '0', prev = '', op = null, fresh = false;
  let mouthTimer = null;
  const mEl = document.getElementById('main');
  const eEl = document.getElementById('expr');

  /* ── Format number ── */
  function fmt(n) {
    if (!isFinite(n)) return 'Error';
    let s = parseFloat(n.toPrecision(10)).toString();
    if (s.length > 12) s = parseFloat(n).toExponential(4);
    return s;
  }

  /* ── Toggle face expression ── */
  function setMouth(open) {
    document.getElementById('mouth-open').style.display   = open ? '' : 'none';
    document.getElementById('mouth-smile').style.display  = open ? 'none' : '';
    document.getElementById('eye-left-open').style.display  = open ? '' : 'none';
    document.getElementById('eye-right-open').style.display = open ? '' : 'none';
    document.getElementById('eye-left-happy').style.display  = open ? 'none' : '';
    document.getElementById('eye-right-happy').style.display = open ? 'none' : '';
  }

  /* ── Sticker click: open/close mouth 3 times ── */
  function doraClick(btn) {
    btn.style.transform = 'scale(1.18) rotate(-6deg)';
    setTimeout(() => { btn.style.transform = ''; }, 250);

    if (mouthTimer) clearTimeout(mouthTimer);
    let count = 0;
    const total = 6; // 3 open + 3 close cycles

    function tick() {
      if (count >= total) { setMouth(true); return; }
      setMouth(count % 2 === 0 ? false : true);
      count++;
      mouthTimer = setTimeout(tick, 350);
    }
    tick();
  }

  /* ── Calculator logic ── */
  function ca(v) {
    if (v === 'C') {
      cur = '0'; prev = ''; op = null; fresh = false;
      eEl.textContent = ''; mEl.textContent = '0'; return;
    }
    if (v === '+/-') {
      cur = cur.startsWith('-') ? cur.slice(1) : '-' + cur;
      mEl.textContent = cur; return;
    }
    if (v === '%') {
      cur = fmt(parseFloat(cur) / 100);
      mEl.textContent = cur; return;
    }
    if (['+', '-', '*', '/'].includes(v)) {
      if (op && !fresh) {
        let r = cmp(parseFloat(prev), parseFloat(cur), op);
        cur = fmt(r); mEl.textContent = cur; prev = cur;
      } else { prev = cur; }
      op = v; fresh = true;
      const sym = { '+': '+', '-': '−', '*': '×', '/': '÷' }[op];
      eEl.textContent = prev + ' ' + sym; return;
    }
    if (v === '=') {
      if (!op) return;
      let r = cmp(parseFloat(prev), parseFloat(cur), op);
      const sym = { '+': '+', '-': '−', '*': '×', '/': '÷' }[op];
      eEl.textContent = prev + ' ' + sym + ' ' + cur + ' =';
      cur = fmt(r); op = null; fresh = false; prev = '';
      mEl.textContent = cur; return;
    }
    if (v === '.') {
      if (fresh) { cur = '0.'; fresh = false; }
      else if (!cur.includes('.')) cur += '.';
      mEl.textContent = cur; return;
    }
    if (fresh) { cur = v; fresh = false; }
    else { cur = cur === '0' ? v : cur + v; }
    if (cur.length > 12) cur = cur.slice(0, -1);
    mEl.textContent = cur;
  }

  function cmp(a, b, o) {
    if (o === '+') return a + b;
    if (o === '-') return a - b;
    if (o === '*') return a * b;
    if (o === '/') return b === 0 ? NaN : a / b;
  }

  /* ── Keyboard support ── */
  document.addEventListener('keydown', e => {
    const k = e.key;
    if (k >= '0' && k <= '9') ca(k);
    else if (k === '.') ca('.');
    else if (['+', '-', '*', '/'].includes(k)) ca(k);
    else if (k === 'Enter' || k === '=') ca('=');
    else if (k === 'Escape') ca('C');
    else if (k === '%') ca('%');
  });
</script>

</body>
</html>
